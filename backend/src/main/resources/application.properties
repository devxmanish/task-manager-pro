server.port=${PORT:8080}

# ===== MySQL =====
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/task_manager_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:mySuperSecretKeyThatIsLongEnoughForHS512AlgorithmNeedMinimum64Bytes2024SecureApp}
app.jwt.expiration-ms=86400000

# ===== OTP + Reset =====
app.otp.secret=${OTP_SECRET:otpHmacSecretKeyForSigningTokens2024SecureEnough}
app.otp.expiry-minutes=5
app.reset.expiry-minutes=15

# ===== Email =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:noreply@taskmanager.com}

# ===== Frontend URL =====
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
