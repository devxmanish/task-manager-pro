server.port=${PORT:8080}

# ===== MySQL =====
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/task_manager_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000

# ===== OTP + Reset =====
app.otp.secret=${OTP_SECRET:}
app.otp.expiry-minutes=5
app.reset.expiry-minutes=15

# ===== Resend Email =====
app.resend.api-key=${RESEND_API_KEY:re_your_api_key}
app.mail.from=${MAIL_FROM:onboarding@resend.dev}
app.mail.from-name=${MAIL_FROM_NAME:Team Task Manager}

# ===== Frontend URL =====
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
